# 1. Especificar la interfaz (El archivo que ya viene con OpenOCD)
source [find interface/jlink.cfg]

# 2. Configurar el protocolo de comunicación
transport select jtag

# 3. Especificar el microcontrolador (usar la configuración local del repo)
set DAP_TAPID 0x0
set JRC_TAPID 0x3b95502f
set _LOCAL_TMS570_CFG [file join [file dirname [info script]] ti_tms570.cfg]
source $_LOCAL_TMS570_CFG

# 4. Configurar la velocidad del JTAG (Opcional, pero recomendado)
adapter speed 2000

# 5. No asumir la línea SRST; dejar que el target entre por JTAG normal
reset_config none